name: Modernization CLI

# Prerequisites:
# 1. Create a GitHub Personal Access Token with required scopes:
#    - Go to: https://github.com/settings/personal-access-tokens
#    - Generate new token
# 2. Add the token as a repository secret named GH_TOKEN
#    - Go to: Repository Settings > Secrets and variables > Actions
#    - Create new secret: GH_TOKEN
#    - Paste your token value
 
on:
  workflow_dispatch:
    inputs:
      upgrade_target:
        description: 'Upgrade target (e.g., Java 21, .NET 10)'
        required: false
        default: 'latest'
  schedule:
    # Run during off-peak hours: 2 AM UTC daily
    - cron: '0 2 * * *'
  push:
    branches:
      - main

permissions:
    id-token: write
    contents: write # This is required for actions/checkout
    actions: read

jobs:
  modernization:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Download Modernize CLI
        run: |
          MODERNIZE_DIR="$HOME/modernize-cli"
          mkdir -p "$MODERNIZE_DIR"
          wget https://github.com/microsoft/modernize-cli/releases/latest/download/modernize_linux_x64.tar.gz
          tar -xzf modernize_linux_x64.tar.gz -C "$MODERNIZE_DIR" --remove-files
          chmod +x "$MODERNIZE_DIR/modernize"
          echo "$MODERNIZE_DIR" >> $GITHUB_PATH
 
      - name: Run Modernize CLI to upgrade code
        run: |
          TARGET="${{ github.event.inputs.upgrade_target }}"
          if [ -z "$TARGET" ] || [ "$TARGET" = "latest" ]; then
            modernize upgrade --no-tty
          else
            modernize upgrade "$TARGET" --no-tty
          fi

      - name: Push changes to result branch
        id: push_changes
        run: |
          TARGET="${{ github.event.inputs.upgrade_target || 'latest' }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="modernize-upgrade-${TARGET}-${TIMESTAMP}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit all uncommitted changes if there are any
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git reset .github/workflows
            git commit -m "chore: apply Modernize CLI changes [skip ci]" || echo "No changes to commit"
          fi
          
          # Push to remote
          git checkout -B "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Pushed to branch: $BRANCH_NAME"

      - name: Display Results Summary
        if: success()
        run: |
          echo "## 🎉 Modernization Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Branch Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Result Branch**: \`${{ steps.push_changes.outputs.BRANCH_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ github.event.inputs.upgrade_target || 'latest' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Links" >> $GITHUB_STEP_SUMMARY
          echo "- [View Branch](https://github.com/${{ github.repository }}/tree/${{ steps.push_changes.outputs.BRANCH_NAME }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Create PR Manually](https://github.com/${{ github.repository }}/compare/main...${{ steps.push_changes.outputs.BRANCH_NAME }})" >> $GITHUB_STEP_SUMMARY
          echo "- [View Logs Artifact](#artifacts)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Modernize CLI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: modernize-logs
          path: ~/.modernize/logs/
          if-no-files-found: warn