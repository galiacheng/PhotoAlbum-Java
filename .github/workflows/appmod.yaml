name: Modernization CLI

# Prerequisites:
# 1. Create a GitHub Personal Access Token (classic) with 'repo' and 'workflow' scopes
#    - Go to: https://github.com/settings/tokens
#    - Generate new token (classic)
#    - Select scopes: repo, workflow
# 2. Add the token as a repository secret named GHO_TOKEN
#    - Go to: Repository Settings > Secrets and variables > Actions
#    - Create new secret: GHO_TOKEN
#    - Paste your token value
 
on:
  workflow_dispatch:
    inputs:
      upgrade_target:
        description: 'Upgrade target (e.g., Java 21, .NET 10)'
        required: false
        default: 'latest'
      input_result_branch:
          description: 'Branch for the result'
          required: false
          default: 'modernize-upgrade-result'
          type: string
  push:
    branches:
      - main

permissions:
    id-token: write
    contents: write # This is required for actions/checkout
    actions: read

jobs:
  batch-modernization:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GHO_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate GH_TOKEN
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Error: GHO_TOKEN secret is not set"
            echo "Please add GHO_TOKEN to repository secrets"
            exit 1
          fi
          echo "GH_TOKEN is configured"
 
      - name: Download Modernize CLI
        run: |
          MODERNIZE_DIR="$HOME/modernize-cli"
          mkdir -p "$MODERNIZE_DIR"
          wget https://github.com/galiacheng/apmod-cli/releases/latest/download/modernize_linux_x64.tar.gz
          tar -xzf modernize_linux_x64.tar.gz -C "$MODERNIZE_DIR" --remove-files
          chmod +x "$MODERNIZE_DIR/modernize"
          echo "$MODERNIZE_DIR" >> $GITHUB_PATH
 
      - name: Run Modernize CLI to upgrade code
        run: |
          TARGET="${{ github.event.inputs.upgrade_target }}"
          if [ -z "$TARGET" ] || [ "$TARGET" = "latest" ]; then
            modernize upgrade --no-tty
          else
            modernize upgrade "$TARGET" --no-tty
          fi

      - name: Push changes to result branch
        env:
          TARGET_BRANCH: ${{ inputs.input_result_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit all uncommitted changes if there are any
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git reset .github/workflows
            git commit -m "chore: apply Modernize CLI changes [skip ci]" || echo "No changes to commit"
          fi
          # Push to remote
          git checkout -B "$TARGET_BRANCH"
          git push origin "$TARGET_BRANCH"