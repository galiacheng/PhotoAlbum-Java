# Spring Boot Configuration
server.port=8080

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Azure Database for PostgreSQL Configuration with Managed Identity
# Configured to use Azure Active Directory token-based authentication via AzurePostgresqlAuthenticationPlugin
spring.datasource.url=jdbc:postgresql://photoalbum-postgresql.postgres.database.azure.com:5432/photoalbum?sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
spring.datasource.username=photoalbum-mi
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Migrated from Oracle to PostgreSQL according to java check item: Replace OracleDialect with PostgreSQLDialect.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Application Configuration - File Upload Validation
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Azure Blob Storage Configuration (using managed identity)
azure.storage.account-name=${AZURE_STORAGE_ACCOUNT_NAME:photoalbumsa}
azure.storage.container-name=photos

# Logging
logging.level.com.photoalbum=DEBUG
logging.level.org.springframework.web=DEBUG
