# Docker-specific configuration for Azure Database for PostgreSQL with Managed Identity
# Configured to use Azure Active Directory token-based authentication via AzurePostgresqlAuthenticationPlugin
spring.datasource.url=jdbc:postgresql://photoalbum-postgresql.postgres.database.azure.com:5432/photoalbum?sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin
spring.datasource.username=photoalbum-mi
spring.datasource.driver-class-name=org.postgresql.Driver

# Azure Managed Identity client ID (set via AZURE_CLIENT_ID environment variable)
spring.cloud.azure.credential.client-id=${AZURE_CLIENT_ID:}

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JPA Configuration for Docker
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Server settings
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging for Docker
logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG