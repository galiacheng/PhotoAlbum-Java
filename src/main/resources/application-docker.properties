# Migrated from Oracle to PostgreSQL according to property check item 1: Change JDBC URL from Oracle to PostgreSQL.
# Migrated from Oracle to PostgreSQL according to property check item 8: Enable passwordless connection. Update the PostgreSQL JDBC URL to support auth by managed identity.
# Remember to set the value for the environment variables in the url value below
# For Azure sovereign cloud, add these parameters in the url:
#  azure.scopes
#     - azure_china: https://ossrdbms-aad.database.chinacloudapi.cn/.default
#     - azure_germany: https://ossrdbms-aad.database.cloudapi.de/.default
#     - azure_us_government: https://ossrdbms-aad.database.usgovcloudapi.net/.default
#     - azure: https://ossrdbms-aad.database.windows.net/.default
#  azure.authorityHost
#     - azure_china: https://login.partner.microsoftonline.cn
#     - azure_germany: https://login.microsoftonline.de
#     - azure_us_government: https://login.microsoftonline.us
#     - azure: https://login.microsoftonline.com
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?user=${MANAGED_IDENTITY_NAME}&sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin&azure.managedIdentityEnabled=true&azure.clientId=${MANAGED_IDENTITY_CLIENT_ID}
# Migrated from Oracle to PostgreSQL according to property check item 8: Comment out all content about "username" and "password" because now PostgreSQL will authenticate using managed identity.
# spring.datasource.username=photoalbum
# spring.datasource.password=photoalbum
# Migrated from Oracle to PostgreSQL according to property check item 2: Replace Oracle JDBC driver class with PostgreSQL driver class.
spring.datasource.driver-class-name=org.postgresql.Driver
# Example url of auth by Service Principal instead of Managed Identity
# spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?user=${SERVICE_PRINCIPAL_NAME}&sslmode=require&authenticationPluginClassName=com.azure.identity.extensions.jdbc.postgresql.AzurePostgresqlAuthenticationPlugin&azure.clientId=${SERVICE_PRINCIPAL_CLIENT_ID}&azure.clientSecret=${SERVICE_PRINCIPAL_CLIENT_SECRET}&azure.tenantId=${SERVICE_PRINCIPAL_TENANT_ID}

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Migrated from Oracle to PostgreSQL according to property check item 3: Change Hibernate dialect from Oracle to PostgreSQL.
# JPA Configuration for Docker
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration - Validation only (photos stored in PostgreSQL database)
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Other settings remain the same
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Logging for Docker
logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG