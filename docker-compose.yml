services:
  # Azure Database for PostgreSQL (local development using official PostgreSQL image)
  # Migrated from Oracle to PostgreSQL according to property check item 1: Replace Oracle database service with PostgreSQL service.
  postgres-db:
    image: postgres:16
    container_name: photoalbum-postgres
    environment:
      - POSTGRES_DB=photoalbum
      - POSTGRES_USER=photoalbum
      - POSTGRES_PASSWORD=photoalbum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - photoalbum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoalbum -d photoalbum"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Photo Album Java Application  
  photoalbum-java-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photoalbum-java-app
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - PGHOST=postgres-db
      - PGPORT=5432
      - PGDATABASE=photoalbum
      # Local development: override datasource URL with traditional username/password credentials.
      # For Azure deployment with Managed Identity, remove the overrides below and set
      # MANAGED_IDENTITY_NAME and MANAGED_IDENTITY_CLIENT_ID instead.
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/photoalbum
      - SPRING_DATASOURCE_USERNAME=photoalbum
      - SPRING_DATASOURCE_PASSWORD=photoalbum
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - photoalbum-network
    restart: on-failure

volumes:
  postgres_data:

networks:
  photoalbum-network:
    driver: bridge
