services:
  # Photo Album Java Application - connects to Azure Database for PostgreSQL with Managed Identity
  photoalbum-java-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photoalbum-java-app
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
    ports:
      - "8080:8080"
    networks:
      - photoalbum-network
    restart: on-failure

networks:
  photoalbum-network:
    driver: bridge
